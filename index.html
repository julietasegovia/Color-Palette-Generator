<!DOCTYPE html>
<html lang = eng>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Color Generator</title>

        <link rel="stylesheet" href="colors.css">
    </head>
    <body>

        <main>
            <h1>Color Generator</h1>
            <p>
                Press [<button class="generator-button">Space</button>] to generate a new color palette.
            </p>

            <h4>Generator</h4>

            <div class="colors">
                <div class="color">
                    <button class="lock-toggle">
                        <img src="images/lock-open.svg" />
                    </button>

                    <input type="text" class="color-imput" value="#000000"/>
                
                    <button class="copy-hex">Copy</button>
                </div>
                <div class="colors">
                <div class="color">
                    <button class="lock-toggle">
                        <img src="images/lock-open.svg" />
                    </button>

                    <input type="text" class="color-imput" value="#000000"/>
                
                    <button class="copy-hex">Copy</button>
                </div>
                <div class="colors">
                <div class="color">
                    <button class="lock-toggle">
                        <img src="images/lock-open.svg" />
                    </button>

                    <input type="text" class="color-imput" value="#000000"/>
                
                    <button class="copy-hex">Copy</button>
                </div>
                <div class="colors">
                <div class="color">
                    <button class="lock-toggle">
                        <img src="images/lock-open.svg" />
                    </button>

                    <input type="text" class="color-imput" value="#000000"/>
                
                    <button class="copy-hex">Copy</button>
                </div>
            </div>
        </main>

        <script src="colors.js"></script>
    </body>
</html>
